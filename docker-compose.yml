# Solo Founder Agents - Docker Compose

services:
  telegram-bot:
    build:
      context: .
      dockerfile
      args:
        build:
          dockerfile: ./Dockerfile
          dockerfile: ./docker-compose.yml
      target: telegram-bot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m src.bot.telegram
    profiles:
      - bot

volumes:
  data:
