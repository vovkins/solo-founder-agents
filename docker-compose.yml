# Solo Founder Agents - Docker Compose

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sfa-telegram
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m src.bot.telegram
    profiles:
      - bot

volumes:
  data:
